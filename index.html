<!DOCTYPE html>
<html lang="om">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; font-family:Arial; display:flex; justify-content:center; align-items:center; min-height:100vh; }
.calc { background:#0f3460; border-radius:20px; padding:20px; width:360px; }
.display { background:#000; border-radius:10px; padding:15px; margin-bottom:15px; text-align:right; }
.expression { color:#888; font-size:14px; min-height:20px; }
.result { color:#00ff88; font-size:36px; font-weight:bold; }
.buttons { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
button { padding:14px 5px; border:none; border-radius:10px; font-size:14px; font-weight:bold; cursor:pointer; }
.btn-num { background:#1a4a7a; color:white; }
.btn-op { background:#e94560; color:white; }
.btn-fn { background:#533483; color:white; font-size:12px; }
.btn-eq { background:#00ff88; color:#000; }
.btn-clr { background:#e94560; color:white; }
.btn-zero { grid-column:span 2; }

/* VAULT */
.vault { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; flex-direction:column; align-items:center; padding:20px; overflow-y:auto; }
.vault.open { display:flex; }
.vault h2 { color:#00ff88; margin:20px 0; }
.vault-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:100%; }
.vault-grid img { width:100%; border-radius:10px; }
.vault-grid video { width:100%; border-radius:10px; }
.upload-btn { margin:10px; padding:15px 30px; background:#00ff88; border:none; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer; }
.close-btn { padding:10px 30px; background:#e94560; color:white; border:none; border-radius:10px; font-size:16px; cursor:pointer; margin-top:10px; }
</style>
</head>
<body>

<!-- CALCULATOR -->
<div class="calc" id="calcView">
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="buttons">
    <button class="btn-fn" onclick="calcFn('sin')">sin</button>
    <button class="btn-fn" onclick="calcFn('cos')">cos</button>
    <button class="btn-fn" onclick="calcFn('tan')">tan</button>
    <button class="btn-fn" onclick="calcFn('log')">log</button>
    <button class="btn-fn" onclick="calcFn('ln')">ln</button>
    <button class="btn-fn" onclick="calcFn('sqrt')">√</button>
    <button class="btn-fn" onclick="calcFn('square')">x²</button>
    <button class="btn-fn" onclick="calcFn('cube')">x³</button>
    <button class="btn-fn" onclick="insertVal('Math.PI')">π</button>
    <button class="btn-fn" onclick="insertVal('Math.E')">e</button>
    <button class="btn-fn" onclick="insertVal('(')">(</button>
    <button class="btn-fn" onclick="insertVal(')')">)</button>
    <button class="btn-fn" onclick="calcFn('percent')">%</button>
    <button class="btn-fn" onclick="toggleSign()">+/-</button>
    <button class="btn-clr" onclick="clearAll()">AC</button>
    <button class="btn-num" onclick="insertVal('7')">7</button>
    <button class="btn-num" onclick="insertVal('8')">8</button>
    <button class="btn-num" onclick="insertVal('9')">9</button>
    <button class="btn-op" onclick="insertVal('/')">÷</button>
    <button class="btn-op" onclick="deleteLast()">⌫</button>
    <button class="btn-num" onclick="insertVal('4')">4</button>
    <button class="btn-num" onclick="insertVal('5')">5</button>
    <button class="btn-num" onclick="insertVal('6')">6</button>
    <button class="btn-op" onclick="insertVal('*')">×</button>
    <button class="btn-fn" onclick="insertVal('**')">xʸ</button>
    <button class="btn-num" onclick="insertVal('1')">1</button>
    <button class="btn-num" onclick="insertVal('2')">2</button>
    <button class="btn-num" onclick="insertVal('3')">3</button>
    <button class="btn-op" onclick="insertVal('-')">−</button>
    <button class="btn-eq" onclick="calculate()" style="grid-row:span 2">=</button>
    <button class="btn-num btn-zero" onclick="insertVal('0')">0</button>
    <button class="btn-num" onclick="insertVal('.')">.</button>
    <button class="btn-op" onclick="insertVal('+')">+</button>
  </div>
</div>

<!-- VAULT -->
<div class="vault" id="vaultView">
  <h2>🔒 Vault Koo</h2>
  <input type="file" id="fileInput" accept="image/*,video/*" multiple style="display:none" onchange="addFiles(this)">
  <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📁 Photo/Video Ida'i</button>
  <div class="vault-grid" id="vaultGrid"></div>
  <button class="close-btn" onclick="closeVault()">✕ Cufii</button>
</div>

<script>
// SECRET CODE
const SECRET = '1234=';
let expression = '';
let typed = '';

function checkSecret(val) {
  typed += val;
  if(typed.length > SECRET.length) typed = typed.slice(1);
  if(typed === SECRET) openVault();
}

function openVault() {
  document.getElementById('vaultView').classList.add('open');
  typed = '';
  expression = '';
  document.getElementById('result').textContent = '0';
  document.getElementById('expression').textContent = '';
}

function closeVault() {
  document.getElementById('vaultView').classList.remove('open');
}

function addFiles(input) {
  const grid = document.getElementById('vaultGrid');
  Array.from(input.files).forEach(file => {
    const url = URL.createObjectURL(file);
    let el;
    if(file.type.startsWith('image/')) {
      el = document.createElement('img');
    } else {
      el = document.createElement('video');
      el.controls = true;
    }
    el.src = url;
    grid.appendChild(el);
  });
}

function updateDisplay() {
  document.getElementById('expression').textContent = expression
    .replace(/Math\.PI/g,'π').replace(/Math\.E/g,'e')
    .replace(/\*/g,'×').replace(/\//g,'÷');
}

function insertVal(val) {
  checkSecret(val);
  expression += val;
  updateDisplay();
  document.getElementById('result').textContent = expression
    .replace(/Math\.PI/g,'π').replace(/Math\.E/g,'e')
    .replace(/\*/g,'×').replace(/\//g,'÷');
}

function calcFn(fn) {
  let num = parseFloat(expression)||0, res;
  switch(fn) {
    case 'sin': res=Math.sin(num*Math.PI/180); break;
    case 'cos': res=Math.cos(num*Math.PI/180); break;
    case 'tan': res=Math.tan(num*Math.PI/180); break;
    case 'log': res=Math.log10(num); break;
    case 'ln': res=Math.log(num); break;
    case 'sqrt': res=Math.sqrt(num); break;
    case 'square': res=num*num; break;
    case 'cube': res=num*num*num; break;
    case 'percent': res=num/100; break;
  }
  expression=String(parseFloat(res.toFixed(10)));
  updateDisplay();
  document.getElementById('result').textContent=expression;
}

function toggleSign() {
  expression=expression.startsWith('-')?expression.slice(1):'-'+expression;
  updateDisplay();
}

function calculate() {
  checkSecret('=');
  try {
    let res=eval(expression.replace(/÷/g,'/').replace(/×/g,'*'));
    document.getElementById('expression').textContent=expression
      .replace(/Math\.PI/g,'π').replace(/Math\.E/g,'e')+' =';
    expression=String(parseFloat(res.toFixed(10)));
    document.getElementById('result').textContent=expression;
  } catch(e) {
    document.getElementById('result').textContent='Dogoggora!';
    expression='';
  }
}

function clearAll() {
  expression='';
  document.getElementById('expression').textContent='';
  document.getElementById('result').textContent='0';
  typed='';
}

function deleteLast() {
  expression=expression.slice(0,-1);
  updateDisplay();
  document.getElementById('result').textContent=expression||'0';
}
</script>
</body>
  </html>
